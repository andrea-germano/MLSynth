model:
  name: "llama31_70B"
  num_layers: 80
  hidden_size: 8192
  num_attention_heads: 64
  num_kv_heads: 8           # GQA (8 KV head)
  head_dim: 128             # = 8192/64
  intermediate_size: 28672  # SwiGLU
  ffn_type: swiglu
  vocab_size: 128256
  bytes_per_val: 2          # bf16
  scale: 1.0

prefill_parallelism:
  tp_size: 4
  pp_size: 2

decode_parallelism:
  tp_size: 8
  pp_size: 1

inference:
  serialize_decode_iterations: true
  kv_transfer: streaming   # bulk | streaming

  # The static "blob" of requests (no arrival times, no continuous batching).
  # Heterogeneous prompt / generation lengths are allowed.
  requests:
    - { prompt_len: 16, gen_len: 4 }
    - { prompt_len: 8,  gen_len: 6 }
    - { prompt_len: 32, gen_len: 2 }
  
  # Homogeneous shorthand (use instead of `requests`):
  # num_requests: 4
  # prompt_len: 16
  # gen_len: 4