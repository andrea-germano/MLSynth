model:
  name: "transformer_test"
  num_layers: 8
  hidden_size: 4096
  sequence_len: 4096
  vocab_size: 32000
  bytes_per_val: 2
  scale: 1.0

hardware:
  peak_flops: 3.0e14         # H100 fp16, ~300 TFLOPS
  memory_bandwidth: 3.0e12   # H100 HBM3, ~3 TB/s

prefill_parallelism:
  tp_size: 4
  pp_size: 2

decode_parallelism:
  tp_size: 8
  pp_size: 1